  <g transform="translate(1050, 480)">
    <circle cx="0" cy="0" r="90" fill="#FFFFFF" opacity="0.1"/>
    <text x="0" y="20" text-anchor="middle" font-family="Arial" font-weight="900" font-size="80" fill="#FFFFFF">P</text>
  </g>
